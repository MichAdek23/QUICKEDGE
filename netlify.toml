[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_ENV = "production"
  # Note: Ensure you set the following variables securely in the Netlify Dashboard UI:
  # NEXT_PUBLIC_SUPABASE_URL
  # NEXT_PUBLIC_SUPABASE_ANON_KEY
  # SUPABASE_SERVICE_ROLE_KEY
  # ADMIN_SECRET_KEY
  # NEXT_PUBLIC_BASE_URL (Update this to your actual production domain once deployed)
